<!-- 
    create html and javascript of a playable slot machine game

    Make the machine and text in vintage colors and black background.

    Make a lever pull animation to begin the spin add sound effects for lever pull, spinning, and winning

    make the reel animation spin similar to a vintage slot machine

    Make 3 reels and 5 symbols (Cherry, Lemon, Bell, Bar, 7) with different probabilities and payouts.

    3 symbols in a row or 2 symbold trigger a payout.

    Start with 100 credits and each spin costs default 10. 

    Make bet adjustable from 1 to 10 per line

    Make each line toggelable so player can choose to bet on 1, 2 or 3 lines and adjust the total cost accordingly

    Display symbol panel with each symbol and probability and payout and theoretical rtp of each and total rtp of the game

    Below symbol panel display stats panel with total bet and total payout and calculate the actual rtp

    Below stats panel display panel with the history of # spin and payout

    Make each panel resizeable and collapsable with a toggle button on the header of each panel
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vintage Slot Machine</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --gold: #d4af37;
            --dark-metal: #1a1a1a;
            --brass: #b8860b;
        }

        .machine-container {
            background: linear-gradient(145deg, #2c2c2c, #111);
            border: 12px solid #333;
            border-image: linear-gradient(to bottom, #555, #222, #444) 1;
            border-radius: 40px;
            padding: 40px;
            position: relative;
            box-shadow: 
                0 30px 60px rgba(0,0,0,0.9),
                inset 0 0 40px rgba(0,0,0,0.8);
            overflow: visible;
        }

        /* Decorative Rivets */
        .rivet {
            position: absolute;
            width: 14px;
            height: 14px;
            background: radial-gradient(circle at 4px 4px, #777, #222);
            border-radius: 50%;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            z-index: 10;
        }
        .rivet-tl { top: 15px; left: 15px; }
        .rivet-tr { top: 15px; right: 15px; }
        .rivet-bl { bottom: 15px; left: 15px; }
        .rivet-br { bottom: 15px; right: 15px; }

        /* The Reel Window "Inside" */
        .reels-frame {
            background: #000;
            border: 6px solid #444;
            border-radius: 10px;
            box-shadow: 
                inset 0 10px 30px rgba(0,0,0,1),
                0 0 15px rgba(212, 175, 55, 0.2);
            position: relative;
            padding: 10px;
        }

        /* Mechanical Lever Graphic */
        .lever-system {
            position: absolute;
            right: -105px;
            top: 130px;
            width: 85px;
            height: 300px;
            cursor: pointer;
            z-index: 5;
        }
        .lever-base {
            position: absolute;
            width: 55px;
            height: 90px;
            background: linear-gradient(to right, #333, #555, #222);
            border-radius: 10px 0 0 10px;
            left: 0;
            bottom: 0;
        }
        .lever-arm {
            position: absolute;
            width: 22px;
            height: 210px;
            background: linear-gradient(to right, #888, #eee, #666);
            left: 28px;
            top: 0px;
            transform-origin: bottom center;
            transition: transform 0.4s cubic-bezier(0.45, 0.05, 0.55, 0.95);
            border-radius: 10px;
        }
        .lever-knob {
            position: absolute;
            width: 75px;
            height: 75px;
            background: radial-gradient(circle at 25px 25px, #ff4d4d, #800);
            border-radius: 50%;
            top: -65px;
            left: -26px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }

        .lever-system.pulling .lever-arm {
            transform: rotateX(60deg) scaleY(0.5);
        }

        /* Glass Reflection Effect */
        .glass-reflection {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(
                135deg,
                rgba(255,255,255,0.1) 0%,
                rgba(255,255,255,0.05) 25%,
                transparent 50%
            );
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>

<div class="game-layout">
    <div class="side-panels">
        <div class="panel" id="symbol-panel">
            <div class="panel-header" id="stats-header">
                <h3>Symbol Stats</h3>
                <span class="toggle-icon">▼</span>
            </div>
            <div class="panel-content">
                <table>
                    <thead>
                        <tr>
                            <th>Sym</th>
                            <th>%</th>
                            <th>3-Hit %</th>
                            <th>Payout</th>
                            <th>RTP</th>
                        </tr>
                    </thead>
                    <tbody id="symbol-stats-body"></tbody>
                </table>
            </div>
        </div>

        <div class="panel" id="session-panel">
            <div class="panel-header" id="session-header">
                <h3>Session Stats</h3>
                <span class="toggle-icon">▼</span>
            </div>
            <div class="panel-content">
                <table>
                    <tbody>
                        <tr>
                            <td>Total Payout</td>
                            <td id="total-payout" style="text-align: right; color: #fff; font-weight: bold;">0</td>
                        </tr>
                        <tr>
                            <td>Total Bet</td>
                            <td id="total-bet" style="text-align: right; color: #fff; font-weight: bold;">0</td>
                        </tr>
                        <tr style="border-top: 1px solid #333; font-weight: bold;">
                            <td style="color: var(--gold);">Actual RTP</td>
                            <td id="actual-rtp" style="text-align: right; color: var(--gold);">0.00%</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="panel history-container" id="history-section">
            <div class="panel-header" id="history-toggle">
                <h3>Spin History</h3>
                <span id="history-icon">▼</span>
            </div>
            <textarea id="history" readonly placeholder="Pull the lever to begin..."></textarea>
        </div>
    </div>

<div class="machine-container">
    <header>
        <h1>Royal Mechanical</h1>
        <div class="subtitle">EST. 1954 • PRECISION REELS</div>
    </header>
    
    <div class="credit-main-box">
        <div class="rivet rivet-tl"></div>
        <div class="rivet rivet-tr"></div>
        <div class="rivet rivet-bl"></div>
        <div class="rivet rivet-br"></div>
        
        <div class="lever-system" id="lever-control">
            <div class="lever-base"></div>
            <div class="lever-arm">
                <div class="lever-knob"></div>
            </div>
        </div>

        <div class="label">CREDITS</div>
        <span id="balance">10</span>
    </div>

    <div class="reels-frame">
        <div class="reels-container">
            <div class="reel" id="reel-0"><div class="symbol-strip" id="strip-0"></div></div>
            <div class="reel" id="reel-1"><div class="symbol-strip" id="strip-1"></div></div>
            <div class="reel" id="reel-2"><div class="symbol-strip" id="strip-2"></div></div>
            <div class="glass-reflection"></div>
            <div class="payline top"></div>
            <div class="payline middle"></div>
            <div class="payline bottom"></div>
        </div>
        <div class="line-toggles">
            <input type="checkbox" id="line-top" checked title="Toggle Top Line">
            <input type="checkbox" id="line-middle" checked title="Toggle Middle Line">
            <input type="checkbox" id="line-bottom" checked title="Toggle Bottom Line">
        </div>
    </div>

    <div class="controls">
        <div class="bet-adjust">
            BET/LINE: 
            <button id="bet-dec">-</button>
            <span id="bet-val">1</span>
            <button id="bet-inc">+</button>
        </div>
        <div class="total-cost-display">TOTAL COST: <span id="total-spin-cost">3</span> CREDITS</div>
        <button id="spin-btn">SPIN</button>
        <div><button id="reset-btn">Reset Game</button></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
