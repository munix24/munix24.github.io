<!-- 
 generate html and javascript of a fifadle idle game with 6 rounds and each round gives clues, the goal is to guess the country participating in the 2026 fifa world cup 
 
 black background and dark theme
 
 -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fifadle: 2026 World Cup Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-container">
    <div class="settings-container">
        <span id="settings-toggle" class="settings-gear" title="Settings">⚙️</span>
        <div id="settings-panel" class="settings-panel">
            <div class="control-row">
                <span id="music-mute-btn" class="control-icon" title="Toggle Music">🎵</span>
                <input type="range" id="music-volume" min="0" max="1" step="0.01">
            </div>
            <div class="control-row">
                <span id="sfx-mute-btn" class="control-icon" title="Toggle SFX">🔊</span>
                <input type="range" id="sfx-volume" min="0" max="1" step="0.01">
            </div>
            <button id="reset-game-btn" onclick="resetGame()">New Game</button>
            <button id="test-completion-btn" onclick="testCompletion()">Test Completion (47/48)</button>
            <button id="reset-progress-btn" onclick="resetGame(true)">Reset All Progress</button>
        </div>
    </div>
    <h1>🏆 Fifadle 2026</h1>
    <div class="score-indicator">
        <span id="score-text" data-tooltip="Countries played / Total Countries.">Countries: 0 / 48</span>
        <span id="avg-text" data-tooltip="Average number of clues used per country (Clues Used / Countries played).">Avg Clues: 0.0</span>
        <span id="best-avg-text" data-tooltip="Your best average clues record after finding all 48 teams.">Best Avg: -</span>
        <span id="win-count-text" data-tooltip="Total number of countries guessed correctly.">Wins: 0</span>
        <span id="accuracy-text" data-tooltip="Percentage of games won (Wins / Total games finished).">Accuracy: 0.0%</span>
        <span id="best-accuracy-text" data-tooltip="Your highest accuracy record after finding all 48 teams.">Best Acc: -</span>
    </div>

    <p>Guess the 2026 World Cup Country using the clues</p>
    <div id="message"></div>

    <div class="clue-indicator">
        <span id="clue-text">Clue 1 / 6</span>
        <span id="total-clues-text" data-tooltip="The total number of clues revealed this game.">Clues Used: 0</span>
    </div>

    <div class="clue-list" id="clue-container">
        <!-- Clues will be injected here via JavaScript -->
    </div>

    <button id="share-btn" style="margin-top:8px; width:100%; display:none;" onclick="shareResults()">Share Result 📋</button>

    <div class="input-group" id="controls">
        <input type="text" id="guess-input" placeholder="Enter country..." list="countries-list">
        <datalist id="countries-list"></datalist>
        <button onclick="makeGuess()" id="submit-btn">Submit</button>
        <button onclick="skipClue()" id="skip-btn" style="padding: 12px 6px;">Skip Clue</button>
        <button onclick="initGame()" id="play-again-btn" style="display:none; width:100%;">Next Country</button>
        <button onclick="resetGame(false, false)" id="new-game-btn" style="display:none; width:100%;">New Game</button>
    </div>

    <div id="side-panel" class="side-panel">
        <div class="side-panel-header">
            <h3>48 / 48</h3>
        </div>
        <div id="side-country-list" class="side-country-list"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script src="script.js"></script>
</body>
</html>
